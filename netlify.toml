[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200

[[redirects]]
  from = "/api/ai-summary"
  to = "/.netlify/functions/ai-summary"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
